<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #1e3a5f 0%, #db2877 30%, #fdf2f8 30%);

  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;

}

  border-radius: 99px;

  font-size: 0.8rem;

/* ── Slide dots ── */

  display: flex;
  justify-content: center;
  gap: 7px;
  padding: 6px 0 10px;
  flex-shrink: 0;
}
.dot {
  width: 8px; height: 8px;

}

}

/* ── Main content ── */

  overflow-y: auto;

.slide-badge {

  border-radius: 99px;

  font-size: 0.72rem;
  font-weight: 800;
  margin-bottom: 10px;

.slide-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.6rem;

.dot-pulse span {

  background: #db2877;
  animation: pulse 0.8s ease-in-out infinite;
}
.dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%,100% { transform: scale(0.6); opacity: 0.4; }

.chip-row {

.chip {
  border-radius: 10px;

  font-weight: 700;

}

/* ── Example sentence ── */

  padding: 12px 14px;

/* ── Bottom controls ── */
.bottom-controls {
  background: white;
  border-radius: 22px 22px 0 0;
  padding: 14px 18px 18px;

  align-items: center;

<script>
/* ══════════════════════════════════════════

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphYWdsZGdxcXBmeXBqbGdmdWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjUxOTMsImV4cCI6MjA5MDIwMTE5M30.uz1G6JOPfituQ34wBbkIHgACuLC7NgOHEUGnvFs37O0';

/* ══════════════════════════════════════════
   SLIDE DEFINITIONS
══════════════════════════════════════════ */
const TOPIC = {
  name: 'Nouns, Verbs, Adjectives & Adverbs',
  day: 'Monday',
};

const SLIDES = [
  {
    badge: 'Hi Vivan! 👋',
    badgeBg: '#ede9fe', badgeColor: '#5b21b6',

  {

    badgeBg: '#ede9fe', badgeColor: '#5b21b6',
    title: 'Noun',

    chipBg: '#ede9fe', chipColor: '#5b21b6',
    example: {
      sentence: 'The <mark style="background:#c4b5fd;color:#3c3489;">dog</mark> ran to the <mark style="background:#c4b5fd;color:#3c3489;">park</mark> after <mark style="background:#c4b5fd;color:#3c3489;">school</mark>.',

    example: {
      sentence: 'Vivan <mark style="background:#86efac;color:#14532d;">ran</mark> fast and then <mark style="background:#86efac;color:#14532d;">ate</mark> his lunch.',

    geminiPrompt: `You are a warm, friendly teacher explaining English to Vivan, a 7-year-old boy in Texas. English is his second language. In 3-4 natural conversational sentences, explain what a VERB is. Use fun active examples — running, jumping, eating. Use the example sentence "Vivan ran fast and then ate his lunch" and point out the verbs. Give the trick: ask "what is happening?" and the answer is the verb. Sound like a real teacher chatting with a child, enthusiastic and simple. No lists.`,

    geminiPrompt: `You are a warm, friendly teacher explaining English to Vivan, a 7-year-old boy in Texas. English is his second language. In 3-4 natural conversational sentences, explain what an ADVERB is and how it is different from an adjective. Use the example "Vivan quickly ran inside and loudly called for mum". Point out that quickly and loudly describe HOW he did things. Give the -ly trick. Then wrap up by congratulating Vivan on learning all four word types and tell him the quiz is about to start. Sound warm, celebratory and natural. No lists.`,

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let currentSlide = 0;
let slideTexts   = {};
let synth        = window.speechSynthesis;
let voices       = [];
let isSpeaking   = false;

/* ══════════════════════════════════════════
   VOICE SETUP — naturalness fix
   Uses speakSequence approach: splits on sentence boundaries
   so the browser engine handles each sentence cleanly,
   avoiding the robotic run-on effect.
══════════════════════════════════════════ */
function loadVoices() {
  voices = synth.getVoices();
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function getBestVoice() {
  // Priority: Samantha (macOS/iOS) → Google US English (Chrome) → any en-US → any English
  return voices.find(v => v.name === 'Samantha')
      || voices.find(v => v.name.includes('Google US English'))
      || voices.find(v => v.lang === 'en-US' && !v.localService)
      || voices.find(v => v.lang === 'en-US')
      || voices.find(v => v.lang.startsWith('en'))
      || null;
}

/**
 * Split text into sentences for naturalness.
 * Each sentence gets its own utterance so the engine
 * applies proper prosody at sentence boundaries.
 */
function splitSentences(text) {
  // Split on . ! ? followed by space or end-of-string
  return text.match(/[^.!?]+[.!?]*/g)
             ?.map(s => s.trim())
             .filter(s => s.length > 0)
         || [text];
}

function setSpeakingUI(speaking) {
  isSpeaking = speaking;
  const btn    = document.getElementById('speak-btn');
  const bubble = document.getElementById('ai-bubble');
  if (btn)    btn.classList.toggle('speaking', speaking);
  if (bubble) bubble.classList.toggle('speaking', speaking);
}

/**
 * speakSequence — the naturalness fix.
 * Queues sentences one at a time using onend chaining.
 * Much more natural than a single long utterance.
 */
function speakSequence(sentences, idx) {
  if (idx >= sentences.length) { setSpeakingUI(false); return; }
  if (idx === 0) setSpeakingUI(true);

  const utt   = new SpeechSynthesisUtterance(sentences[idx]);
  utt.lang    = 'en-US';
  utt.rate    = 0.88;
  utt.pitch   = 1.05;
  const voice = getBestVoice();
  if (voice) utt.voice = voice;

  utt.onend   = () => speakSequence(sentences, idx + 1);
  utt.onerror = () => { setSpeakingUI(false); };

  synth.speak(utt);
}

function speakText(text) {
  if (!synth || !text) return;
  synth.cancel();
  // Small delay ensures cancel() has flushed before new utterances queue
  setTimeout(() => {
    const sentences = splitSentences(text);
    speakSequence(sentences, 0);
  }, 150);
}

function replaySpeak() {
  const text = slideTexts[currentSlide];
  if (text) speakText(text);
}

function speakWord(word) {
  synth.cancel();
  setTimeout(() => {
    const utt   = new SpeechSynthesisUtterance(word);
    utt.rate    = 0.82;
    utt.lang    = 'en-US';
    const voice = getBestVoice();
    if (voice) utt.voice = voice;
    synth.speak(utt);
  }, 80);
}

/* ══════════════════════════════════════════
   GEMINI — via Supabase Edge Function (ai-proxy)
   Works from any real HTTP origin (GitHub Pages, Netlify).
   Uses the paid quota key, same as the main StarLearn app.
══════════════════════════════════════════ */
async function fetchExplanation(slideIdx) {
  const cacheKey = `ela_slide_${slideIdx}_${getTodayDate()}`;
  const cached   = localStorage.getItem(cacheKey);
  if (cached) {
    slideTexts[slideIdx] = cached;
    return cached;
  }

  const prompt = SLIDES[slideIdx].geminiPrompt;

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/ai-proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
      body: JSON.stringify({
        model: 'gemini-2.0-flash',
        max_tokens: 300,
        system: 'You are a warm, friendly primary school teacher. Respond with ONLY the spoken explanation — no headings, no bullet points, no markdown, no asterisks. Just natural flowing sentences as if speaking aloud to a child.',
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) {
      const errText = await res.text();
      console.warn('Gemini API error:', res.status, errText);
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text?.trim() || '';

    if (text) {
      // Clean up any stray markdown that slips through
      const clean = text.replace(/\*\*/g, '').replace(/\*/g, '').replace(/#+\s/g, '').trim();
      slideTexts[slideIdx] = clean;
      localStorage.setItem(cacheKey, clean);
      return clean;
    }
  } catch(e) {
    console.warn('Gemini fetch failed:', e.message);
  }

  // Fallback — at least something meaningful per slide
  const fallbacks = [
    'Welcome, Vivan! Today we are going to learn about four important types of words that make English make sense. Every word in a sentence has a special job, and by the end of this lesson you will know exactly what those jobs are!',
    'A noun is a word that names a person, a place, or a thing. Words like dog, school, park, and even your name Vivan are all nouns. Here is a trick — if you can say "the" in front of a word, it is usually a noun. The dog. The park. The school. See how that works?',
    'A verb is an action word — it tells us what someone is doing. Words like ran, jumped, and ate are all verbs. If you ask yourself "what is happening in this sentence?", the answer is always the verb!',
    'An adjective is a word that describes a noun and makes it more interesting. Instead of just "a dog", we can say "a big fluffy dog". Big and fluffy are adjectives. They sit right next to the noun they are describing.',
    'An adverb describes a verb and tells us how, when, or where something happens. Words like quickly and loudly are adverbs. Here is a great trick — most adverbs end in the letters L-Y. Quick becomes quickly. Loud becomes loudly. Now you know all four word types. Amazing work, Vivan!',
  ];
  const fallback = fallbacks[slideIdx] || `Let us learn about ${SLIDES[slideIdx].title}. Study the examples carefully and you will do great in the quiz!`;
  slideTexts[slideIdx] = fallback;
  return fallback;
}

function getTodayDate() {
  return new Date().toISOString().slice(0, 10);
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = SLIDES.map((_, i) =>
    `<div class="dot${i === currentSlide ? ' active' : ''}"></div>`
  ).join('');
}

async function renderCurrentSlide() {
  const s      = SLIDES[currentSlide];
  const scroll = document.getElementById('slide-scroll');
  const counter = document.getElementById('slide-counter');
  const btnBack = document.getElementById('btn-back');
  const btnNext = document.getElementById('btn-next');

  counter.textContent = `${currentSlide + 1} of ${SLIDES.length}`;
  btnBack.disabled    = currentSlide === 0;
  btnNext.textContent = s.isLast ? '🎯 Start Quiz →' : 'Next →';

  renderDots();

  const chipHtml = s.chips?.length
    ? `<div class="chip-row">${s.chips.map(c =>
        `<span class="chip" style="background:${s.chipBg};color:${s.chipColor};"
          onclick="speakWord('${c}')">${c}</span>`
      ).join('')}</div>`
    : '';

  const exHtml = s.example
    ? `<div class="example-card" style="background:${s.example.bg};">
        <div class="example-label">Example sentence</div>
        <div class="example-text">${s.example.sentence}</div>
       </div>`
    : '';

  const tipHtml = s.tip
    ? `<div class="tip-box" style="background:${s.tip.bg};color:${s.tip.color};">${s.tip.text}</div>`
    : '';

  const ctaHtml = s.isLast
    ? `<div class="cta-card">
        <h2>You are ready, Vivan! 🌟</h2>
        <p>You have learned all 4 word types. Now let us see how much you remember!</p>
       </div>`
    : '';

  // Show loading state first
  scroll.innerHTML = `
    <div class="slide-card">
      <span class="slide-badge" style="background:${s.badgeBg};color:${s.badgeColor};">${s.badge}</span>
      <div class="slide-title">${s.title}</div>
      <div class="slide-subtitle">${s.subtitle}</div>
      <div class="ai-bubble" id="ai-bubble">
        <div class="ai-loading">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
          Getting your lesson ready…
        </div>
      </div>
      ${chipHtml}
      ${exHtml}
      ${tipHtml}
    </div>
    ${ctaHtml}
  `;

  // Stop any current speech
  synth && synth.cancel();

  // Fetch or use cached
  let text = slideTexts[currentSlide];
  if (!text) {
    text = await fetchExplanation(currentSlide);
  }

  const bubble = document.getElementById('ai-bubble');
  if (bubble) {
    bubble.innerHTML = '';
    bubble.textContent = text;
  }

  // Speak with natural sentence-by-sentence approach
  speakText(text);
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function goSlide(dir) {
  synth && synth.cancel();
  setSpeakingUI(false);
  const next = currentSlide + dir;
  if (next < 0) return;
  if (next >= SLIDES.length) {
    alert('Quiz starting! (Will launch the ELA quiz in the full app)');
    return;
  }
  currentSlide = next;

  // Pre-fetch next slide in background
  if (currentSlide + 1 < SLIDES.length && !slideTexts[currentSlide + 1]) {
    fetchExplanation(currentSlide + 1);
  }

  renderCurrentSlide();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
document.getElementById('topic-pill').textContent = `📖 ${TOPIC.name} · ${TOPIC.day}`;

// Pre-fetch first two slides in background
fetchExplanation(0);
fetchExplanation(1);

renderCurrentSlide();
</script>
