/* ════════════════════════════════════════

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let currentSlide = 0;
let slideData    = {};   // { idx: { explanation, chips, example, highlights, tip } }
let synth        = window.speechSynthesis;
let voices       = [];
let isSpeaking   = false;

/* ════════════════════════════════════════
   VOICE — wait properly for Chrome to load voices
   Chrome loads voices async. We poll until they arrive,
   then pick Google US English which sounds natural.
════════════════════════════════════════ */
function getVoices() {
  return new Promise(resolve => {
    let v = synth.getVoices();
    if (v.length) { voices = v; resolve(v); return; }
    // Poll every 100ms up to 3 seconds
    let attempts = 0;
    const interval = setInterval(() => {
      v = synth.getVoices();
      attempts++;
      if (v.length || attempts > 30) {
        clearInterval(interval);
        voices = v;
        resolve(v);
      }
    }, 100);
  });
}

function getBestVoice() {
  if (!voices.length) voices = synth.getVoices();
  const saved = localStorage.getItem('sl_voice_name');
  if (saved) {
    const picked = voices.find(v => v.name === saved);
    if (picked) return picked;
  }
  // Chrome Windows — Google neural voices are best
  const preferred = [
    'Google US English',
    'Google UK English Female',
    'Moira', 'Karen', 'Daniel', 'Samantha',
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name === name || v.name.includes(name));
    if (v) return v;
  }
  // Avoid Microsoft robotic voices if anything else exists
  return voices.find(v => v.lang === 'en-US' && !v.name.includes('Microsoft'))
      || voices.find(v => v.lang.startsWith('en') && !v.name.includes('Microsoft'))
      || voices.find(v => v.lang.startsWith('en'))
      || null;
}

function setSpeakingUI(on) {
  isSpeaking = on;
  document.getElementById('speak-btn')?.classList.toggle('speaking', on);
  document.getElementById('ai-bubble')?.classList.toggle('speaking', on);
}

async function speakText(text) {
  if (!synth || !text) return;
  synth.cancel();
  await getVoices(); // ensure voices are loaded before speaking
  setTimeout(() => {
    setSpeakingUI(true);
    const utt  = new SpeechSynthesisUtterance(text);
    utt.lang   = 'en-US';
    utt.rate   = 0.85;
    utt.pitch  = 1.0;
    utt.volume = 1.0;
    const v    = getBestVoice();
    if (v) utt.voice = v;
    utt.onend  = () => setSpeakingUI(false);
    utt.onerror = () => setSpeakingUI(false);
    synth.speak(utt);
  }, 150);
}

function replaySpeak() {
  const d = slideData[currentSlide];
  if (d?.explanation) speakText(d.explanation);
}

function speakWord(word) {
  synth.cancel();
  setTimeout(async () => {
    await getVoices();
    const utt = new SpeechSynthesisUtterance(word);
    utt.rate = 0.80; utt.lang = 'en-US';
    const v = getBestVoice();
    if (v) utt.voice = v;
    synth.speak(utt);
  }, 100);
}

   VOICE PICKER
════════════════════════════════════════ */

  const panel = document.getElementById('voice-panel');
  if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
  await getVoices();
  const englishVoices = voices.filter(v => v.lang.startsWith('en'));
  const saved = localStorage.getItem('sl_voice_name') || getBestVoice()?.name || '';
  panel.innerHTML = `
    <div style="font-size:0.75rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">🎙️ Choose a voice</div>
    <select id="voice-select"
      style="width:100%;padding:8px 10px;border-radius:10px;border:2px solid #e5e7eb;
             font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;color:#1f2937;
             background:white;cursor:pointer;margin-bottom:8px;">
      ${englishVoices.map(v => `<option value="${v.name}" ${v.name===saved?'selected':''}>${v.name} (${v.lang})</option>`).join('')}
    </select>
    <div style="display:flex;gap:8px;">
      <button onclick="previewVoice(document.getElementById('voice-select').value)"
        style="flex:1;padding:7px;border-radius:9px;border:2px solid #db2877;background:white;
               color:#db2877;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;">
        ▶ Preview
      </button>
      <button onclick="saveVoice(document.getElementById('voice-select').value)"
        style="flex:1;padding:7px;border-radius:9px;border:none;background:#db2877;color:white;
               font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;">
        ✓ Use this
      </button>
    </div>
    <div id="voice-msg" style="font-size:0.75rem;color:#15803d;font-weight:700;margin-top:5px;min-height:16px;"></div>
  `;
  panel.style.display = 'block';
}

function previewVoice(name) {
  synth.cancel();
  const v = voices.find(v => v.name === name); if (!v) return;
  const utt = new SpeechSynthesisUtterance("Hi Vivan! I am your StarLearn teacher. Let us learn together today!");
  utt.voice = v; utt.rate = 0.85; utt.pitch = 1.0; utt.lang = 'en-US';
  synth.speak(utt);
}

function saveVoice(name) {
  localStorage.setItem('sl_voice_name', name);
  const msg = document.getElementById('voice-msg');
  if (msg) { msg.textContent = '✓ Voice saved!'; setTimeout(() => msg.textContent='', 2000); }
}

/* ════════════════════════════════════════
   GEMINI — generates ALL slide content as JSON
   No cache — fresh content every session
════════════════════════════════════════ */
async function fetchSlideData(slideIdx) {
  if (slideData[slideIdx]) return slideData[slideIdx]; // already fetched this session

  const tmpl = SLIDE_TEMPLATES[slideIdx];

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/ai-proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
      body: JSON.stringify({
        model: 'gemini-2.0-flash',
        max_tokens: 500,
        system: 'You are a JSON generator for a children\'s educational app. Return ONLY a valid JSON object — no markdown fences, no backticks, no explanation, just raw JSON.',
        messages: [{ role: 'user', content: tmpl.aiPrompt }],
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw  = await res.json();
    let text   = raw.content?.find(b => b.type === 'text')?.text?.trim() || '';
    // Strip any accidental markdown fences
    text = text.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    const json = JSON.parse(text);
    // Sanitise — ensure all keys exist
    const data = {
      explanation: json.explanation || '',
      chips:       Array.isArray(json.chips) ? json.chips : [],
      example:     json.example || '',
      highlights:  Array.isArray(json.highlights) ? json.highlights : [],
      tip:         json.tip || '',
    };
    slideData[slideIdx] = data;
    return data;

  } catch(e) {
    console.warn('Gemini fetch failed for slide', slideIdx, e.message);
    // Rich fallbacks so the lesson still works
    const fallbacks = [
      { explanation:"Welcome Vivan! Today we are going to learn about four special types of words that make English work — nouns, verbs, adjectives, and adverbs. Every single word in a sentence has a job to do, and knowing those jobs will make you a reading and writing superstar!", chips:["dog","run","big","fast","park","eat"], example:"The big dog runs fast in the park.", highlights:["big","fast"], tip:"💡 Think of words like workers in a team — each one has its own special job!" },
      { explanation:"A noun is a word that names a person, a place, an animal, or a thing. Your name Vivan is a noun! The word school is a noun. Pizza is a noun! Nouns are everywhere — they are the names we give to everything around us.", chips:["Vivan","pizza","lion","school","India","rocket"], example:"Vivan ate pizza near the school.", highlights:["Vivan","pizza","school"], tip:"💡 Trick: ask yourself 'can I touch it or see it?' — if yes, it's probably a noun!" },
      { explanation:"A verb is an action word — it tells us what someone or something is doing. When you jump, run, eat, or laugh, those are all verbs! Even thinking and sleeping are verbs because they are things you do.", chips:["jump","crash","giggle","fly","eat","sleep"], example:"The monkey giggled and jumped over the log.", highlights:["giggled","jumped"], tip:"💡 Trick: ask 'what is happening?' and the answer is always the verb!" },
      { explanation:"An adjective is a describing word — it tells us more about a noun. Instead of just saying 'a dog' we can say 'a fluffy golden dog'. The words fluffy and golden are adjectives! They make sentences much more interesting and colourful.", chips:["fluffy","golden","tiny","spicy","loud","freezing"], example:"The tiny fluffy rabbit ate a spicy carrot.", highlights:["tiny","fluffy","spicy"], tip:"💡 Trick: adjectives always sit next to or near the noun they describe!" },
      { explanation:"An adverb tells us more about a verb — usually HOW, WHEN, or WHERE something happens. If you run quickly, the word quickly is the adverb. Most adverbs end in -ly which makes them easy to spot! Amazing work today Vivan — you have learned all four word types and the quiz is up next!", chips:["quickly","loudly","gently","never","always","here"], example:"She gently picked up the baby and quietly sang.", highlights:["gently","quietly"], tip:"💡 Trick: most adverbs end in -LY. Quick→quickly, Loud→loudly, Gentle→gently!" },
    ];
    slideData[slideIdx] = fallbacks[slideIdx] || fallbacks[0];
    return slideData[slideIdx];
  }
}

  ).join('');
}

function buildHighlightedSentence(sentence, highlights, markBg, markColor) {
  if (!highlights.length) return sentence;
  let result = sentence;
  highlights.forEach(word => {
    // case-insensitive whole-word replace
    const re = new RegExp(`\\b(${word})\\b`, 'gi');
    result = result.replace(re, `<mark style="background:${markBg};color:${markColor};">$1</mark>`);
  });
  return result;
}

async function renderCurrentSlide() {
  const tmpl   = SLIDE_TEMPLATES[currentSlide];
  const scroll = document.getElementById('slide-scroll');

  document.getElementById('slide-counter').textContent = `${currentSlide+1} of ${SLIDE_TEMPLATES.length}`;
  document.getElementById('btn-back').disabled = currentSlide === 0;
  document.getElementById('btn-next').textContent = tmpl.isLast ? '🎯 Start Quiz →' : 'Next →';
  renderDots();

  // Show loading skeleton immediately
  scroll.innerHTML = `
    <div class="slide-card">
      <span class="slide-badge" style="background:${tmpl.badgeBg};color:${tmpl.badgeColor};">${tmpl.badge}</span>
      <div class="slide-title">${tmpl.title}</div>
      <div class="slide-subtitle">${tmpl.subtitle}</div>
      <div class="ai-bubble" id="ai-bubble">
        <div class="ai-loading">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
          Preparing your lesson…
        </div>
      </div>
      <div class="chip-row" id="chip-row"></div>
      <div id="example-area"></div>
      <div id="tip-area"></div>
    </div>
    ${tmpl.isLast ? `<div class="cta-card"><h2>You are ready, Vivan! 🌟</h2><p>You have learned all 4 word types. The quiz is next!</p></div>` : ''}
  `;

  synth?.cancel();

  // Fetch AI content
  const data = await fetchSlideData(currentSlide);
  const t    = tmpl.theme;

  // Update bubble
  const bubble = document.getElementById('ai-bubble');
  if (bubble) { bubble.innerHTML = ''; bubble.textContent = data.explanation; }

  // Update chips
  const chipRow = document.getElementById('chip-row');
  if (chipRow && data.chips.length) {
    chipRow.innerHTML = data.chips.map(c =>
      `<span class="chip" style="background:${t.chipBg};color:${t.chipColor};"
        onclick="speakWord('${c.replace(/'/g,"\\'")}'">${c}</span>`
    ).join('');
  }

  // Update example
  const exArea = document.getElementById('example-area');
  if (exArea && data.example) {
    const highlighted = buildHighlightedSentence(data.example, data.highlights, t.markBg, t.markColor);
    exArea.innerHTML = `
      <div class="example-card" style="background:${t.exBg};">
        <div class="example-label">Example sentence</div>
        <div class="example-text">${highlighted}</div>
      </div>`;
  }

  // Update tip
  const tipArea = document.getElementById('tip-area');
  if (tipArea && data.tip) {
    tipArea.innerHTML = `<div class="tip-box" style="background:${t.tipBg};color:${t.tipColor};">${data.tip}</div>`;
  }

  // Pre-fetch next slide in background
  if (currentSlide + 1 < SLIDE_TEMPLATES.length) {
    fetchSlideData(currentSlide + 1);
  }

  // Speak
  speakText(data.explanation);
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function goSlide(dir) {
  synth?.cancel();
  setSpeakingUI(false);
  const next = currentSlide + dir;
  if (next < 0) return;
  if (next >= SLIDE_TEMPLATES.length) {
    alert('Quiz starting! (Will launch the ELA quiz in the full app)');
    return;
  }
  currentSlide = next;
  renderCurrentSlide();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
document.getElementById('topic-pill').textContent = '📖 Nouns, Verbs, Adjectives & Adverbs';
getVoices(); // start loading voices immediately
renderCurrentSlide();
</script>
